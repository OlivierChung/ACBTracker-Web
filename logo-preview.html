<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ACBTracker — Logo Concepts</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f8fafc; color: #1e293b; padding: 40px; }
    h1 { font-size: 14px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 32px; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; max-width: 900px; }
    .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 32px 24px; display: flex; flex-direction: column; gap: 20px; }
    .card h2 { font-size: 11px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: .06em; }
    .preview { display: flex; align-items: center; justify-content: center; height: 100px; }
    .preview-dark { background: #0f172a; border-radius: 12px; padding: 20px; height: 100px; display: flex; align-items: center; justify-content: center; }
    .sizes { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    hr { border: none; border-top: 1px solid #f1f5f9; }
  </style>
</head>
<body>
  <h1>ACBTracker — Logo Concepts</h1>
  <div class="grid">

    <!-- Option A: Chart line + wordmark -->
    <div class="card">
      <h2>Option A — Line chart mark</h2>
      <div class="preview">
        <svg width="200" height="44" viewBox="0 0 200 44" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Icon: rounded square with upward line chart -->
          <rect width="44" height="44" rx="10" fill="#2563eb"/>
          <polyline points="8,32 16,22 24,26 32,14 40,10" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <circle cx="40" cy="10" r="2.5" fill="white"/>
          <!-- Wordmark -->
          <text x="52" y="16" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="#1e293b">ACB</text>
          <text x="52" y="32" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="400" fill="#64748b" letter-spacing="0.05em">TRACKER</text>
        </svg>
      </div>
      <hr/>
      <div class="preview-dark">
        <svg width="200" height="44" viewBox="0 0 200 44" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="44" height="44" rx="10" fill="#3b82f6"/>
          <polyline points="8,32 16,22 24,26 32,14 40,10" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <circle cx="40" cy="10" r="2.5" fill="white"/>
          <text x="52" y="16" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="white">ACB</text>
          <text x="52" y="32" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="400" fill="#94a3b8" letter-spacing="0.05em">TRACKER</text>
        </svg>
      </div>
      <div class="sizes">
        <svg width="32" height="32" viewBox="0 0 44 44" fill="none"><rect width="44" height="44" rx="10" fill="#2563eb"/><polyline points="8,32 16,22 24,26 32,14 40,10" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/><circle cx="40" cy="10" r="2.5" fill="white"/></svg>
        <svg width="24" height="24" viewBox="0 0 44 44" fill="none"><rect width="44" height="44" rx="10" fill="#2563eb"/><polyline points="8,32 16,22 24,26 32,14 40,10" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/><circle cx="40" cy="10" r="2.5" fill="white"/></svg>
        <svg width="16" height="16" viewBox="0 0 44 44" fill="none"><rect width="44" height="44" rx="10" fill="#2563eb"/><polyline points="8,32 16,22 24,26 32,14 40,10" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/><circle cx="40" cy="10" r="2.5" fill="white"/></svg>
      </div>
    </div>

    <!-- Option B: Maple leaf, blue -->
    <div class="card">
      <h2>Option B — Maple leaf, blue</h2>
      <div class="preview">
        <svg width="200" height="44" viewBox="0 0 200 44" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="44" height="44" rx="10" fill="#2563eb"/>
          <path d="M22 5 L25 14 L30 11 L27 18 L36 16 L30 22 L34 22 L22 38 L10 22 L14 22 L8 16 L17 18 L14 11 L19 14 Z" fill="white"/>
          <text x="22" y="27" font-family="system-ui,sans-serif" font-size="11" font-weight="800" fill="#2563eb" text-anchor="middle">$</text>
          <text x="52" y="16" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="#1e293b">ACB</text>
          <text x="52" y="32" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="400" fill="#64748b" letter-spacing="0.05em">TRACKER</text>
        </svg>
      </div>
      <hr/>
      <div class="preview-dark">
        <svg width="200" height="44" viewBox="0 0 200 44" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="44" height="44" rx="10" fill="#2563eb"/>
          <path d="M22 5 L25 14 L30 11 L27 18 L36 16 L30 22 L34 22 L22 38 L10 22 L14 22 L8 16 L17 18 L14 11 L19 14 Z" fill="white"/>
          <text x="22" y="27" font-family="system-ui,sans-serif" font-size="11" font-weight="800" fill="#2563eb" text-anchor="middle">$</text>
          <text x="52" y="16" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="white">ACB</text>
          <text x="52" y="32" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="400" fill="#94a3b8" letter-spacing="0.05em">TRACKER</text>
        </svg>
      </div>
      <div class="sizes">
        <svg width="32" height="32" viewBox="0 0 44 44" fill="none"><rect width="44" height="44" rx="10" fill="#2563eb"/><path d="M22 5 L25 14 L30 11 L27 18 L36 16 L30 22 L34 22 L22 38 L10 22 L14 22 L8 16 L17 18 L14 11 L19 14 Z" fill="white"/><text x="22" y="27" font-family="system-ui,sans-serif" font-size="11" font-weight="800" fill="#2563eb" text-anchor="middle">$</text></svg>
        <svg width="24" height="24" viewBox="0 0 44 44" fill="none"><rect width="44" height="44" rx="10" fill="#2563eb"/><path d="M22 5 L25 14 L30 11 L27 18 L36 16 L30 22 L34 22 L22 38 L10 22 L14 22 L8 16 L17 18 L14 11 L19 14 Z" fill="white"/><text x="22" y="27" font-family="system-ui,sans-serif" font-size="11" font-weight="800" fill="#2563eb" text-anchor="middle">$</text></svg>
        <svg width="16" height="16" viewBox="0 0 44 44" fill="none"><rect width="44" height="44" rx="10" fill="#2563eb"/><path d="M22 5 L25 14 L30 11 L27 18 L36 16 L30 22 L34 22 L22 38 L10 22 L14 22 L8 16 L17 18 L14 11 L19 14 Z" fill="white"/><text x="22" y="27" font-family="system-ui,sans-serif" font-size="11" font-weight="800" fill="#2563eb" text-anchor="middle">$</text></svg>
      </div>
    </div>

    <!-- Option C: Bar chart with upward arrow -->
    <div class="card">
      <h2>Option C — Bar chart + gradient</h2>
      <div class="preview">
        <svg width="200" height="44" viewBox="0 0 200 44" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="grad" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#6366f1"/>
              <stop offset="100%" stop-color="#2563eb"/>
            </linearGradient>
          </defs>
          <rect width="44" height="44" rx="10" fill="url(#grad)"/>
          <!-- Bar chart bars -->
          <rect x="7" y="26" width="6" height="10" rx="2" fill="white" opacity="0.5"/>
          <rect x="16" y="20" width="6" height="16" rx="2" fill="white" opacity="0.7"/>
          <rect x="25" y="13" width="6" height="23" rx="2" fill="white"/>
          <!-- Upward arrow on top right -->
          <polyline points="33,16 37,10 37,15" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <line x1="33" y1="10" x2="37" y2="10" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <!-- Wordmark -->
          <text x="52" y="16" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="#1e293b">ACB</text>
          <text x="52" y="32" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="400" fill="#64748b" letter-spacing="0.05em">TRACKER</text>
        </svg>
      </div>
      <hr/>
      <div class="preview-dark">
        <svg width="200" height="44" viewBox="0 0 200 44" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="grad2" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#818cf8"/>
              <stop offset="100%" stop-color="#3b82f6"/>
            </linearGradient>
          </defs>
          <rect width="44" height="44" rx="10" fill="url(#grad2)"/>
          <rect x="7" y="26" width="6" height="10" rx="2" fill="white" opacity="0.5"/>
          <rect x="16" y="20" width="6" height="16" rx="2" fill="white" opacity="0.7"/>
          <rect x="25" y="13" width="6" height="23" rx="2" fill="white"/>
          <polyline points="33,16 37,10 37,15" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <line x1="33" y1="10" x2="37" y2="10" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <text x="52" y="16" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="white">ACB</text>
          <text x="52" y="32" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="400" fill="#94a3b8" letter-spacing="0.05em">TRACKER</text>
        </svg>
      </div>
      <div class="sizes">
        <svg width="32" height="32" viewBox="0 0 44 44" fill="none">
          <defs><linearGradient id="g3" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#2563eb"/></linearGradient></defs>
          <rect width="44" height="44" rx="10" fill="url(#g3)"/>
          <rect x="7" y="26" width="6" height="10" rx="2" fill="white" opacity="0.5"/>
          <rect x="16" y="20" width="6" height="16" rx="2" fill="white" opacity="0.7"/>
          <rect x="25" y="13" width="6" height="23" rx="2" fill="white"/>
        </svg>
        <svg width="24" height="24" viewBox="0 0 44 44" fill="none">
          <defs><linearGradient id="g4" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#2563eb"/></linearGradient></defs>
          <rect width="44" height="44" rx="10" fill="url(#g4)"/>
          <rect x="7" y="26" width="6" height="10" rx="2" fill="white" opacity="0.5"/>
          <rect x="16" y="20" width="6" height="16" rx="2" fill="white" opacity="0.7"/>
          <rect x="25" y="13" width="6" height="23" rx="2" fill="white"/>
        </svg>
        <svg width="16" height="16" viewBox="0 0 44 44" fill="none">
          <defs><linearGradient id="g5" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#2563eb"/></linearGradient></defs>
          <rect width="44" height="44" rx="10" fill="url(#g5)"/>
          <rect x="7" y="26" width="6" height="10" rx="2" fill="white" opacity="0.5"/>
          <rect x="16" y="20" width="6" height="16" rx="2" fill="white" opacity="0.7"/>
          <rect x="25" y="13" width="6" height="23" rx="2" fill="white"/>
        </svg>
      </div>
    </div>

  </div>
</body>
</html>
